# =============================================================================
# ResuMesh — Docker Compose Development Overrides
# =============================================================================
#
# This file is AUTOMATICALLY loaded by Docker Compose alongside
# docker-compose.yml when running: docker compose up
#
# It overrides production settings with development-friendly defaults:
#   - Volume mounts for hot reload (backend + frontend)
#   - Development build targets (single worker, --reload, HMR)
#   - No resource limits
#
# To run in PRODUCTION mode (skip this file):
#   docker compose -f docker-compose.yml up --build
# =============================================================================

services:
  # ─────────────────────────────────────────────
  # Backend — Development Mode
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
      target: development
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      DEBUG: "true"
    deploy:
      resources:
        limits:
          memory: 4G

  # ─────────────────────────────────────────────
  # Frontend — Development Mode (Vite HMR)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: development
      additional_contexts:
        docker: ./docker
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_APP_NAME: ResuMesh
    deploy:
      resources:
        limits:
          memory: 512M
