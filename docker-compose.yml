version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: resumesh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resumesh}
      POSTGRES_USER: ${POSTGRES_USER:-resumesh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resumesh_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resumesh_user} -d ${POSTGRES_DB:-resumesh}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resumesh_net

  # ─────────────────────────────────────────────
  # Redis Cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: resumesh_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resumesh_net

  # ─────────────────────────────────────────────
  # ChromaDB Vector Database
  # ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: resumesh_chromadb
    restart: unless-stopped
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8001
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - resumesh_net

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: resumesh_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CHROMA_HOST: ${CHROMA_HOST:-chromadb}
      CHROMA_PORT: ${CHROMA_PORT:-8001}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      SENTENCE_TRANSFORMER_MODEL: ${SENTENCE_TRANSFORMER_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      UPLOAD_DIR: /app/uploads
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - ./models:/app/models
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - resumesh_net

  # ─────────────────────────────────────────────
  # React Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: resumesh_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_APP_NAME: ResuMesh
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - resumesh_net

  # ─────────────────────────────────────────────
  # MLflow Tracking Server
  # ─────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: resumesh_mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-resumesh_user}:${POSTGRES_PASSWORD:-resumesh_password_change_me}@postgres:5432/mlflow
      --default-artifact-root /mlruns
    volumes:
      - mlflow_data:/mlruns
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - resumesh_net

  # ─────────────────────────────────────────────
  # Apache Airflow
  # ─────────────────────────────────────────────
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: ../docker/Dockerfile.airflow
    container_name: resumesh_airflow_webserver
    restart: unless-stopped
    command: webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-resumesh_user}:${POSTGRES_PASSWORD:-resumesh_password_change_me}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      BACKEND_URL: http://backend:8000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - resumesh_net

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: ../docker/Dockerfile.airflow
    container_name: resumesh_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-resumesh_user}:${POSTGRES_PASSWORD:-resumesh_password_change_me}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      BACKEND_URL: http://backend:8000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - resumesh_net

  # ─────────────────────────────────────────────
  # Ollama (Self-hosted LLM)
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: resumesh_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - resumesh_net

  # ─────────────────────────────────────────────
  # Prometheus Monitoring
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: resumesh_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - resumesh_net

  # ─────────────────────────────────────────────
  # Grafana Dashboards
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: resumesh_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - resumesh_net

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  chroma_data:
  mlflow_data:
  ollama_data:
  uploads_data:
  prometheus_data:
  grafana_data:

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  resumesh_net:
    driver: bridge
